server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name fns-cli.afonso.dev;

    http2 on;

    ssl_certificate /etc/letsencrypt/live/afonso.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/afonso.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/security.conf;

    location / {
        proxy_pass http://fnscli-production-web:8080;
        include /etc/nginx/snippets/proxy.conf;
    }
}
