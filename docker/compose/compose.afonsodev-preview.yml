services:
  afonsodev-preview-api:
    image: ghcr.io/afonsodemori/afonsodev-api:${AFONSODEV_PREVIEW_API_TAG:?}
    environment:
      ENV: ${AFONSODEV_PREVIEW_ENV:?}
      ALLOWED_ORIGIN: ${AFONSODEV_PREVIEW_API_ALLOWED_ORIGIN:?}
      RESEND_API_KEY: ${AFONSODEV_PREVIEW_API_RESEND_API_KEY:?}
      RECAPTCHA_SECRET: ${AFONSODEV_PREVIEW_API_RECAPTCHA_SECRET:?}
      TURNSTILE_SECRET: ${AFONSODEV_PREVIEW_API_TURNSTILE_SECRET:?}
      CONTACT_FROM: ${AFONSODEV_PREVIEW_API_CONTACT_FROM:?}
      CONTACT_TO: ${AFONSODEV_PREVIEW_API_CONTACT_TO:?}
    restart: unless-stopped
