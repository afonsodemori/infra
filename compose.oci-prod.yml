services:
  nginx:
    image: dhi.io/nginx:${NGINX_VERSION:?}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./docker/nginx/sites-available:/etc/nginx/sites-available:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/conf.d:ro
      - ${DATA_DIR:?}/letsencrypt:/etc/letsencrypt:ro # TODO: Change volume
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - afonsodev-production-api
      - afonsodev-production-web
    restart: always

include:
  # Application services
  - path: ./docker/compose/compose.afonsodev-production.yml
  # Extra tools
  - path: ./docker/compose/compose.alloy.yml
