services:
  nginx:
    image: dhi.io/nginx:${NGINX_VERSION:?}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./docker/nginx/sites-available:/etc/nginx/sites-available:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/conf.d:ro
      # - ${DATA_DIR:?}/nginx/logs:/var/log/nginx -- TODO: Re-enable
      - ${DATA_DIR:?}/letsencrypt:/etc/letsencrypt:ro # TODO: Change volume
    ports:
      - "80:80"
      - "443:443"
    restart: always
