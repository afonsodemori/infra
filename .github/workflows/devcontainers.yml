name: Build Devcontainer Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  debian-13:
    runs-on: ubuntu-latest
    env:
      DEVCONTAINER_IMAGE_PLATFORMS: ${{ vars.DEVCONTAINER_IMAGE_PLATFORMS }}
      DEVCONTAINER_DEBIAN_IMAGE_NAME: ${{ vars.DEVCONTAINER_DEBIAN_IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        run: |
          echo "TAG_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "TAG_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Debian 13 devcontainer
        run: |
          make devcontainer/debian-13/build TAG_DATE=${{ env.TAG_DATE }} TAG_COMMIT=${{ env.TAG_COMMIT }}

  node-24:
    runs-on: ubuntu-latest
    env:
      DEVCONTAINER_IMAGE_PLATFORMS: ${{ vars.DEVCONTAINER_IMAGE_PLATFORMS }}
      DEVCONTAINER_NODE_IMAGE_NAME: ${{ vars.DEVCONTAINER_NODE_IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        run: |
          echo "TAG_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "TAG_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Node 24 devcontainer
        run: |
          make devcontainer/node-24/build TAG_DATE=${{ env.TAG_DATE }} TAG_COMMIT=${{ env.TAG_COMMIT }}

  go-1-26:
    runs-on: ubuntu-latest
    env:
      DEVCONTAINER_IMAGE_PLATFORMS: ${{ vars.DEVCONTAINER_IMAGE_PLATFORMS }}
      DEVCONTAINER_GOLANG_IMAGE_NAME: ${{ vars.DEVCONTAINER_GOLANG_IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        run: |
          echo "TAG_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "TAG_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Go 1.26 devcontainer
        run: |
          make devcontainer/go-1.26/build TAG_DATE=${{ env.TAG_DATE }} TAG_COMMIT=${{ env.TAG_COMMIT }}
