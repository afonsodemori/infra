name: Build Devcontainers Images

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Select the image to build"
        required: true
        # default: "all"
        type: choice
        options:
          # - all
          - ""
          - debian-13
          - node-24
          - go-1-26

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: debian-13
            image_var: DEVCONTAINERS_DEBIAN_IMAGE_NAME
            make_cmd: devcontainers/debian-13/build
          - id: node-24
            image_var: DEVCONTAINERS_NODE_IMAGE_NAME
            make_cmd: devcontainers/node-24/build
          - id: go-1-26
            image_var: DEVCONTAINERS_GOLANG_IMAGE_NAME
            make_cmd: devcontainers/go-1-26/build

    steps:
      - name: Check if should run
        id: check
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.target }}" == "all" || "${{ github.event.inputs.target }}" == "${{ matrix.id }}" ]]; then
            echo "execute=true" >> $GITHUB_OUTPUT
          else
            echo "execute=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.execute == 'true'

      - name: Set up Docker Buildx
        if: steps.check.outputs.execute == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.execute == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        if: steps.check.outputs.execute == 'true'
        run: |
          echo "TAG_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "TAG_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build ${{ matrix.id }} devcontainer
        if: steps.check.outputs.execute == 'true'
        run: |
          make ${{ matrix.make_cmd }} \
            TAG_DATE="${{ env.TAG_DATE }}" \
            TAG_COMMIT="${{ env.TAG_COMMIT }}" \
            IMAGE_NAME="${{ vars[matrix.image_var] }}" \
            DEVCONTAINERS_IMAGE_PLATFORMS="${{ vars.DEVCONTAINERS_IMAGE_PLATFORMS }}"
